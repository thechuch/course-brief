<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='31' fill='%23000000'/%3E%3Ccircle cx='32' cy='32' r='20' fill='none' stroke='%23F1BB64' stroke-width='4'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    /* Small Circle brand */
    --ink:#000000;          /* Midnight Orbit */
    --white:#FFFFFF;        /* Moonlight White */
    --flare:#F1BB64;        /* Solar Flare (PMS 141 C) */
    --flare-deep:#A9761B;   /* darkened flare for text on white */
    --flare-wash:#FDF4E1;
    --ink-soft:#141416; --ink2:#1C1C1E;
    --canvas:#F6F5F1; --panel:#FFFFFF; --wash:#FBFAF7;
    --sub:#6A6A6E; --faint:#9C9BA0;
    --line:#E7E4DC; --line2:#F0EDE6;
    --grad:linear-gradient(90deg,#F8EBC6,#F1BB64,#C77A2A,#5A3410);
    --sans:'Work Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --sh:0 1px 2px rgba(0,0,0,.04),0 10px 30px -20px rgba(0,0,0,.28);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--canvas);color:var(--ink);font-family:var(--sans);font-size:15px;font-weight:400;line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:-.006em}
  button{font-family:inherit;cursor:pointer;letter-spacing:inherit}
  a{color:var(--flare-deep);text-decoration:none}

  /* eclipse mark */
  .eclipse{width:24px;height:24px;border-radius:50%;background:#000;flex:none;box-shadow:0 0 0 1.3px var(--flare), 0 0 12px 1.5px rgba(241,187,100,.6), inset 0 0 6px rgba(241,187,100,.15)}
  .eclipse.sm{width:19px;height:19px;box-shadow:0 0 0 1.1px var(--flare),0 0 9px 1px rgba(241,187,100,.55)}

  /* top bar — Midnight Orbit */
  header{height:62px;background:var(--ink);border-bottom:1px solid #000;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:20}
  .brandlockup{display:flex;align-items:center;gap:13px;color:var(--white)}
  .brandlockup .nm{font-weight:500;letter-spacing:.24em;font-size:14px}
  .brandlockup .sep{color:#59585c}
  .brandlockup .doc{color:#A6A4A9;font-weight:400;letter-spacing:.02em}
  .brandlockup .tag{font-size:10.5px;color:var(--flare);background:rgba(241,187,100,.14);border:1px solid rgba(241,187,100,.3);border-radius:20px;padding:3px 11px;font-weight:600;letter-spacing:.18em}
  .topright{display:flex;align-items:center;gap:20px}
  .saved{font-size:12px;color:#A6A4A9;display:flex;align-items:center;gap:7px;letter-spacing:.02em}
  .saved .dot{width:6px;height:6px;border-radius:50%;background:var(--flare)}
  .pct{font-size:12px;color:#A6A4A9;display:flex;align-items:center;gap:10px;letter-spacing:.06em}
  .pct .bar{width:100px;height:6px;border-radius:4px;background:rgba(255,255,255,.13);overflow:hidden}
  .pct .bar i{display:block;height:100%;background:var(--grad);width:0;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .pct b{color:var(--white);font-variant-numeric:tabular-nums;font-weight:600}

  .shell{display:flex;min-height:calc(100vh - 62px)}
  /* rail */
  nav.rail{width:294px;flex:none;border-right:1px solid var(--line);padding:24px 14px;background:var(--wash)}
  .railtitle{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);font-weight:500;padding:0 12px 14px}
  .step{display:flex;gap:13px;align-items:flex-start;padding:11px 12px;border-radius:12px;cursor:pointer;transition:background .15s;position:relative}
  .step:hover{background:#F1EEE7}
  .step.active{background:var(--panel);box-shadow:var(--sh)}
  .step.active::before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:3px;background:var(--flare)}
  .step .sd{width:22px;height:22px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-top:1px;border:1.5px solid var(--line);color:var(--faint);background:#fff}
  .step.done .sd{background:var(--ink);border-color:var(--ink);color:#fff}
  .step.partial .sd{background:var(--flare-wash);border-color:var(--flare);color:var(--flare-deep)}
  .step.internal .sd{background:#fff;border-color:var(--flare);color:var(--flare-deep);font-size:9.5px}
  .step .st{font-size:14px;font-weight:500;letter-spacing:-.01em}
  .step .ss{font-size:12px;color:var(--sub);margin-top:2px;letter-spacing:0}
  .step.active .st{color:var(--ink)}
  .railmeter{margin:18px 12px 0;padding:16px;background:var(--panel);border:1px solid var(--line);border-radius:14px}
  .railmeter .rm-t{font-size:12px;color:var(--sub);display:flex;justify-content:space-between;margin-bottom:9px;letter-spacing:0}
  .railmeter .rm-t b{color:var(--ink);font-weight:600}
  .railmeter .rm-b{height:8px;border-radius:5px;background:var(--line);overflow:hidden}
  .railmeter .rm-b i{display:block;height:100%;background:var(--grad);width:0;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .railmeter .rm-n{font-size:11.5px;color:var(--faint);margin-top:10px;line-height:1.4}

  /* main */
  main{flex:1;padding:38px 50px 96px;max-width:880px}
  .eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--flare-deep);font-weight:600}
  h1{font-size:29px;font-weight:600;letter-spacing:-.03em;margin:11px 0 7px}
  .lead{color:var(--sub);font-size:15.5px;font-weight:400;max-width:60ch}
  .sechint{display:flex;gap:11px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--flare);border-radius:12px;padding:13px 16px;margin:22px 0 6px;font-size:13.5px;color:var(--sub)}
  .sechint b{color:var(--ink);font-weight:600}
  .sechint .ic{color:var(--flare-deep)}

  /* field card */
  .field{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:19px 21px;margin-top:17px;box-shadow:var(--sh);transition:border-color .2s}
  .field.confirmed{border-color:#DAD7CF}
  .field.needs{border-style:dashed;border-color:var(--flare);background:linear-gradient(180deg,#FFFDF7,#fff)}
  .fhead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:11px}
  .flabel{display:flex;align-items:center;gap:9px;font-weight:600;font-size:14.5px;letter-spacing:-.01em}
  .why{width:16px;height:16px;border-radius:50%;border:1px solid var(--line);color:var(--faint);font-size:10px;display:inline-flex;align-items:center;justify-content:center;cursor:help;position:relative;font-style:italic}
  .why:hover .whytip{opacity:1;transform:translateY(0);pointer-events:auto}
  .whytip{position:absolute;top:22px;left:-8px;width:252px;background:var(--ink);color:#F4F2EE;font-size:12px;font-weight:400;font-style:normal;line-height:1.45;padding:11px 13px;border-radius:10px;opacity:0;transform:translateY(-4px);transition:.18s;pointer-events:none;z-index:5;box-shadow:0 14px 34px -8px rgba(0,0,0,.5);letter-spacing:0}
  .statepill{font-size:11px;font-weight:600;letter-spacing:.02em;padding:5px 11px;border-radius:20px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .statepill .d{width:7px;height:7px;border-radius:50%}
  .sp-review{background:var(--flare-wash);color:var(--flare-deep)} .sp-review .d{background:var(--flare)}
  .sp-confirmed{background:var(--ink);color:#fff} .sp-confirmed .d{background:var(--flare)}
  .sp-needs{background:#F2F0EB;color:var(--sub);border:1px dashed var(--line)} .sp-needs .d{background:var(--faint)}
  .source{font-size:11.5px;color:var(--faint);margin-bottom:10px;display:flex;align-items:center;gap:6px;letter-spacing:0}
  .source svg{opacity:.7}
  .field input[type=text],.field textarea,.field select,.internalbox textarea{width:100%;font-family:inherit;font-size:14.5px;color:var(--ink);background:var(--wash);border:1px solid var(--line);border-radius:11px;padding:12px 14px;resize:vertical;line-height:1.55;letter-spacing:-.006em}
  .internalbox textarea{background:#fff}
  .internalbox textarea::placeholder{color:var(--faint)}
  .field textarea:focus,.field input:focus,.field select:focus,.internalbox textarea:focus{outline:none;border-color:var(--ink);background:#fff}
  .frow{display:flex;gap:9px;margin-top:13px;align-items:center;flex-wrap:wrap}

  /* pill buttons — brand kit */
  .btn{font-size:13px;font-weight:600;border-radius:999px;padding:9px 17px;border:1.4px solid var(--ink);background:#fff;color:var(--ink);transition:.16s;letter-spacing:.01em}
  .btn:hover{background:var(--ink);color:#fff}
  .btn.pri{background:var(--ink);border-color:var(--ink);color:#fff}
  .btn.pri:hover{background:var(--flare);border-color:var(--flare);color:var(--ink)}
  .btn.ok{border-color:var(--flare);color:var(--flare-deep);background:#fff}
  .btn.ok:hover{background:var(--flare);border-color:var(--flare);color:var(--ink)}
  .btn.sm{padding:7px 14px;font-size:12.5px}
  .btn.ghost{background:none;border-color:transparent;color:var(--sub)}
  .btn.ghost:hover{color:var(--ink);background:#F1EEE8}

  /* asset */
  .asset{display:flex;gap:15px;align-items:center}
  .assetthumb{width:88px;height:88px;border-radius:12px;flex:none;background:repeating-conic-gradient(#EFECE4 0% 25%,#F7F5F0 0% 50%) 50%/16px 16px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:11px;text-align:center;padding:6px}
  .assetopts{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
  .segbtn{font-size:12.5px;font-weight:600;border:1.3px solid var(--line);background:#fff;color:var(--sub);padding:8px 14px;border-radius:999px;transition:.15s}
  .segbtn.on{background:var(--flare-wash);border-color:var(--flare);color:var(--flare-deep)}
  .assetnote{font-size:12.5px;color:var(--sub);margin-top:9px}

  /* timeline */
  .tl{margin-top:8px}
  .tlitem{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 17px;margin-top:12px;box-shadow:var(--sh);display:flex;gap:15px}
  .tlitem.confirmed{border-color:#DAD7CF}
  .tlnode{display:flex;flex-direction:column;align-items:center;flex:none;padding-top:3px}
  .tlnode .dot{width:13px;height:13px;border-radius:50%;background:#fff;border:2px solid var(--flare)}
  .tlitem.confirmed .tlnode .dot{background:var(--ink);border-color:var(--ink);box-shadow:0 0 0 1px var(--flare)}
  .tlnode .line{width:2px;flex:1;background:var(--line);margin-top:5px;min-height:16px}
  .tlbody{flex:1}
  .tldate{font-size:12px;font-weight:700;color:var(--flare-deep);letter-spacing:.05em}
  .tltitle{font-weight:600;font-size:15px;margin:2px 0 5px;letter-spacing:-.01em}
  .tldesc{font-size:13.5px;color:var(--sub);line-height:1.5}
  .tlmeta{display:flex;gap:8px;align-items:center;margin-top:11px;flex-wrap:wrap}
  .chipmini{font-size:11px;color:var(--faint);border:1px solid var(--line);border-radius:20px;padding:4px 10px;display:inline-flex;gap:5px;align-items:center}
  .addrow{margin-top:14px}

  /* lineup product */
  .prod{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:19px;margin-top:16px;box-shadow:var(--sh);display:grid;grid-template-columns:120px 1fr;gap:19px}
  .prod.confirmed{border-color:#DAD7CF}
  .pshot{width:120px;height:170px;border-radius:12px;background:repeating-conic-gradient(#EFECE4 0% 25%,#F7F5F0 0% 50%) 50%/16px 16px;border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--faint);font-size:11px;text-align:center;gap:8px;padding:8px}
  .pshot .rings{width:32px;height:32px;border-radius:50%;background:#000;box-shadow:0 0 0 1px var(--flare),0 0 10px 1px rgba(241,187,100,.5);opacity:.55}
  .phead{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .pname{font-size:18px;font-weight:600;letter-spacing:-.02em}
  .roletag{display:flex;align-items:center;gap:8px;margin:11px 0 4px}
  .roletag label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:600}
  .roletag select{width:auto;max-width:min(100%,320px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:6px 30px 6px 12px;font-weight:600;font-size:12.5px;color:var(--flare-deep);background:var(--flare-wash);border:1px solid var(--flare);border-radius:999px}
  .rolehint{font-size:12.5px;color:var(--sub);margin:2px 0 6px;line-height:1.45}
  /* upload dropzone */
  .dropzone{margin-top:18px;border:2px dashed var(--flare);border-radius:16px;background:linear-gradient(180deg,#FFFDF7,#fff);padding:34px 22px;text-align:center;cursor:pointer;transition:background .15s,border-color .15s,transform .1s}
  .dropzone:hover{background:var(--flare-wash)}
  .dropzone.over{background:var(--flare-wash);border-style:solid;transform:scale(1.005)}
  .dz-mark{width:44px;height:44px;border-radius:50%;background:#000;box-shadow:0 0 0 2px var(--flare),0 0 22px 3px rgba(241,187,100,.45);margin:0 auto 14px}
  .dz-line{font-size:15.5px}
  .dz-or{color:var(--sub)}
  .dz-browse{color:var(--flare-deep);font-weight:600;text-decoration:underline;text-underline-offset:3px}
  .dz-note{font-size:12.5px;color:var(--sub);margin-top:8px}
  .uplist{margin-top:12px;display:flex;flex-direction:column;gap:8px}
  .uprow{display:grid;grid-template-columns:minmax(0,1.4fr) 1fr auto;gap:14px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 15px;font-size:13.5px}
  .upname{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .upsize{color:var(--faint);font-weight:400;font-size:12px;margin-left:8px}
  .upbar{height:7px;border-radius:5px;background:var(--line);overflow:hidden}
  .upbar i{display:block;height:100%;background:var(--grad);transition:width .25s ease}
  .upstate{font-size:12px;color:var(--sub);font-variant-numeric:tabular-nums}
  .upstate.ok{color:var(--flare-deep);font-weight:700}
  .upstate.bad{color:#B4544A;font-weight:600}
  @media(max-width:640px){ .uprow{grid-template-columns:1fr auto;grid-template-rows:auto auto} .upbar{grid-column:1/-1} .dropzone{padding:26px 16px} }
  .rolehint b{color:var(--flare-deep);font-weight:600}
  .wants{list-style:none;margin-top:12px}
  .wants li{font-size:13.5px;padding:9px 0 9px 20px;position:relative;border-top:1px solid var(--line2)}
  .wants li:first-child{border-top:none}
  .wants li::before{content:"";position:absolute;left:3px;top:16px;width:6px;height:6px;border-radius:50%;background:var(--flare)}
  .wants li b{font-weight:600}
  .wants li span{color:var(--sub);margin-left:7px}
  .facts{list-style:none;margin:8px 0 0}
  .facts li{font-size:13.5px;color:var(--ink);padding:7px 0 7px 20px;position:relative;border-top:1px solid var(--line2)}
  .facts li:first-child{border-top:none}
  .facts li::before{content:"";position:absolute;left:3px;top:13px;width:6px;height:6px;border-radius:50%;background:var(--flare)}
  .facts li .k{font-weight:600;color:var(--sub);font-size:11px;letter-spacing:.05em;text-transform:uppercase;margin-right:7px}

  /* features / benefits */
  .fb{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px}
  .fbcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:17px;box-shadow:var(--sh)}
  .fbcard .fbf{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--flare-deep);font-weight:700}
  .fbcard .fbt{font-weight:600;margin:6px 0 8px;font-size:15px;letter-spacing:-.01em}
  .fbcard .fbb{font-size:13px;color:var(--sub)}
  .marks{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .mark{border:1px solid var(--line);border-radius:999px;padding:8px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:9px;background:#fff}
  .mark .mk{width:11px;height:11px;border-radius:50%;background:#000;box-shadow:0 0 0 1px var(--flare),0 0 6px rgba(241,187,100,.6)}

  /* internal / exam */
  .internalbox{background:linear-gradient(180deg,#FFFCF4,#FBFAF7);border:1px solid var(--line);border-left:3px solid var(--flare);border-radius:14px;padding:20px 22px;margin-top:18px}
  .internalbox .lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--flare-deep);font-weight:700;display:flex;align-items:center;gap:8px}
  .exq{background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-top:12px}
  .exq .q{font-weight:600;font-size:14px}
  .exq .opts{margin-top:9px;display:grid;gap:6px}
  .exq .opt{font-size:13px;color:var(--sub);padding:9px 12px;border:1px solid var(--line);border-radius:9px}
  .exq .opt.correct{border-color:var(--flare);background:var(--flare-wash);color:var(--flare-deep);font-weight:600}

  /* welcome */
  .welcome .compare{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px}
  .wcard{border-radius:16px;padding:24px;border:1px solid var(--line)}
  .wcard.old{background:var(--wash)}
  .wcard.new{background:var(--ink);border-color:#000;color:var(--white)}
  .wcard h3{font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:15px;font-weight:600}
  .wcard.old h3{color:var(--faint)} .wcard.new h3{color:var(--flare)}
  .wlist{list-style:none} .wlist li{font-size:14px;padding:9px 0 9px 27px;position:relative;color:var(--sub)}
  .wcard.new .wlist li{color:#E9E7E3}
  .wlist li::before{position:absolute;left:2px;top:9px;font-size:13px}
  .wcard.old .wlist li::before{content:"\2717";color:#B98C8C}
  .wcard.new .wlist li::before{content:"\2713";color:var(--flare);font-weight:700}
  .welcome .stat{display:flex;gap:36px;margin-top:26px;padding:20px 24px;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh)}
  .stat .s b{font-size:25px;display:block;letter-spacing:-.03em;font-weight:600}
  .stat .s span{font-size:12.5px;color:var(--sub)}

  /* footer nav */
  .footnav{position:fixed;bottom:0;left:294px;right:0;background:rgba(246,245,241,.92);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:14px 50px;display:flex;justify-content:space-between;align-items:center;max-width:1174px}
  .footnav .hint{font-size:12.5px;color:var(--sub)}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:12px 19px;border-radius:999px;opacity:0;transition:.3s;z-index:40;box-shadow:0 14px 34px -8px rgba(0,0,0,.5);display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .tk{color:var(--flare)}
  /* welcome overview */
  .wcover{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:26px}
  .wc{display:flex;gap:14px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:15px 17px;box-shadow:var(--sh)}
  .wc .wn{font-weight:600;color:var(--flare-deep);font-size:13px;letter-spacing:.04em;flex:none}
  .wc b{display:block;font-size:14.5px;font-weight:600;letter-spacing:-.01em}
  .wc span{font-size:12.5px;color:var(--sub)}
  .wnote{margin-top:22px;color:var(--faint);font-size:13px}
  @media(max-width:640px){.wcover{grid-template-columns:1fr}}

  /* header left + burger (desktop: burger hidden) */
  .hleft{display:flex;align-items:center;gap:14px}
  .burger{display:none;width:38px;height:38px;border:none;background:none;cursor:pointer;position:relative;flex:none;border-radius:10px;-webkit-tap-highlight-color:transparent}
  .burger span{position:absolute;left:9px;right:9px;height:1.7px;background:var(--white);border-radius:2px;transition:transform .34s cubic-bezier(.5,.15,.2,1),opacity .2s;transform-origin:center}
  .burger span:nth-child(1){top:13px} .burger span:nth-child(2){top:18.5px} .burger span:nth-child(3){top:24px}
  body.menuopen .burger span:nth-child(1){top:18.5px;transform:rotate(45deg)}
  body.menuopen .burger span:nth-child(2){opacity:0;transform:translateX(-6px)}
  body.menuopen .burger span:nth-child(3){top:18.5px;transform:rotate(-45deg)}
  #scrim{display:none;position:fixed;inset:56px 0 0 0;background:rgba(0,0,0,.42);opacity:0;pointer-events:none;transition:opacity .35s;z-index:45;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
  body.menuopen #scrim{opacity:1;pointer-events:auto}
  #mprog{display:none;position:absolute;left:0;right:0;bottom:-1px;height:2.5px;background:rgba(255,255,255,.13)}
  #mprog i{display:block;height:100%;width:0;background:var(--grad);transition:width .55s cubic-bezier(.2,.7,.2,1)}

  /* entrance + press micro-animations */
  @keyframes fadeUp{from{opacity:0;transform:translateY(11px)}to{opacity:1;transform:none}}
  #main.stepin>*{animation:fadeUp .5s both}
  #main.stepin>*:nth-child(2){animation-delay:.045s}
  #main.stepin>*:nth-child(3){animation-delay:.09s}
  #main.stepin>*:nth-child(4){animation-delay:.135s}
  #main.stepin>*:nth-child(5){animation-delay:.18s}
  #main.stepin>*:nth-child(6){animation-delay:.225s}
  #main.stepin>*:nth-child(7){animation-delay:.27s}
  #main.stepin>*:nth-child(n+8){animation-delay:.31s}
  .btn:active{transform:scale(.97)} .segbtn:active{transform:scale(.96)} .step:active{transform:scale(.99)}
  .why.open .whytip{opacity:1;transform:translateY(0);pointer-events:auto}
  @media(prefers-reduced-motion:reduce){ #main.stepin>*{animation:none} .burger span,nav.rail,#scrim,#gate,.field,.prod{transition:none} .justdone{animation:none} .chip:active{transform:none} }

  /* ---------- tablet / mobile ---------- */
  @media(max-width:920px){
    header{z-index:50}
    .burger{display:block}
    .topright .saved{display:none}
    nav.rail{position:fixed;top:56px;left:0;height:calc(100svh - 56px);width:min(87vw,336px);transform:translateX(-101%);transition:transform .42s cubic-bezier(.22,.61,.21,1);z-index:46;box-shadow:14px 0 60px -14px rgba(0,0,0,.5);overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:36px}
    body.menuopen nav.rail{transform:none}
    body.menuopen{overflow:hidden}
    #scrim{display:block}
    #mprog{display:block}
    main{padding:28px 24px 100px;max-width:none}
    .footnav{left:0;right:0;padding:12px 24px;max-width:none;padding-bottom:calc(12px + env(safe-area-inset-bottom))}
    .fb{grid-template-columns:1fr}
    .welcome .compare{grid-template-columns:1fr}
    .welcome .stat{flex-wrap:wrap;gap:20px 34px}
  }
  /* ---------- phone ---------- */
  @media(max-width:640px){
    header{height:56px;padding:0 15px}
    .brandlockup{gap:10px}
    .brandlockup .sep,.brandlockup .doc,.brandlockup .tag{display:none}
    .brandlockup .nm{font-size:12.5px;letter-spacing:.2em}
    .pct .bar,.pctlbl{display:none}
    .pct{gap:0}
    .eyebrow{font-size:10.5px}
    h1{font-size:23px;margin:10px 0 6px}
    .lead{font-size:15px}
    main{padding:22px 16px 100px}
    .sechint{padding:12px 14px;font-size:13px;border-radius:11px}
    .field{padding:16px 16px;border-radius:14px}
    .field input[type=text],.field textarea,.field select,.internalbox textarea{font-size:16px;padding:12px 13px}
    .fhead{flex-wrap:wrap;gap:8px}
    .frow{gap:8px}
    .btn{padding:11px 16px;font-size:13px} .btn.sm{padding:9px 14px}
    .prod{grid-template-columns:92px 1fr;gap:14px;padding:16px;border-radius:14px}
    .pshot{width:92px;height:130px}
    .pname{font-size:16px}
    .roletag{flex-wrap:wrap}
    .why .whytip{left:auto;right:-2px;width:min(74vw,244px)}
    .fb{gap:12px}
    .tlitem{padding:14px 15px}
    .marks .mark{font-size:12.5px;padding:8px 14px}
    .footnav .hint{display:none}
    .footnav{justify-content:space-between}
    .toast{bottom:90px;font-size:12.5px}
    .welcome .stat{padding:18px 20px;gap:16px 30px}
    .stat .s b{font-size:22px}
    .wcard{padding:20px}
    #gate input{width:200px}
  }

  /* passcode gate (deterrent only) */
  #gate{position:fixed;inset:0;z-index:1000;background:radial-gradient(circle at 50% 42%,#17130c 0%,#000 62%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .45s}
  #gate.hidden{opacity:0;pointer-events:none}
  #gate .gecl{width:66px;height:66px;border-radius:50%;background:#000;box-shadow:0 0 0 1.6px var(--flare),0 0 42px 9px rgba(241,187,100,.4);margin-bottom:30px}
  #gate .gwm{color:#fff;letter-spacing:.32em;font-size:15px;font-weight:500}
  #gate .gsub{color:var(--flare);letter-spacing:.24em;font-size:10.5px;margin-top:11px;text-transform:uppercase}
  #gate .grow{margin-top:34px;display:flex;gap:10px}
  #gate input{background:rgba(255,255,255,.06);border:1px solid rgba(241,187,100,.35);border-radius:999px;padding:12px 20px;color:#fff;font-family:var(--sans);font-size:14px;letter-spacing:.06em;width:230px;text-align:center}
  #gate input:focus{outline:none;border-color:var(--flare);background:rgba(255,255,255,.1)}
  #gate button{background:var(--flare);border:none;border-radius:999px;padding:12px 24px;font-family:var(--sans);font-weight:600;font-size:14px;color:#000;cursor:pointer}
  #gate .gerr{color:#E58F8F;font-size:12px;margin-top:16px;height:14px;letter-spacing:.02em}
  #gate .ghint{position:absolute;bottom:28px;color:#4a4842;font-size:11px;letter-spacing:.12em}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{font-size:12px;padding:4px 10px;border-radius:99px;border:1px dashed var(--gold,#c9a15c);background:transparent;color:inherit;cursor:pointer;transition:background .15s}
.chip:hover{background:rgba(201,161,92,.12)}
.chip.add{border-style:solid}

  /* ---- UX pass 2026-07-14: empty states, chips, focus, motion ---- */
  .field{position:relative}
  .field.needs{background:var(--flare-wash);border:1.5px dashed var(--flare)}
  .field.needs::after{content:"You add this";position:absolute;top:-9px;left:16px;background:var(--flare);color:var(--ink);font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 9px;border-radius:99px}
  .field.needs input,.field.needs textarea{border-style:dashed;background:#fff}
  .sp-needs{background:var(--flare);color:var(--ink);border:none}
  .sp-needs .d{background:var(--ink)}
  .chipslbl{display:block;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin:10px 0 4px}
  .chip{min-height:34px;padding:7px 13px;font-size:12.5px;display:inline-flex;align-items:center;border:1px dashed var(--flare);color:var(--sub);background:transparent;border-radius:99px;cursor:pointer;transition:background .15s,border-color .15s}
  .chip::before{content:"＋ ";color:var(--flare-deep)}
  .chip.add{border-style:solid;background:var(--flare-wash);color:var(--flare-deep)}
  .chip.add::before{content:"✦ "}
  .chip:hover{border-color:var(--flare-deep);background:rgba(241,187,100,.16)}
  .chip:active{transform:scale(.95)}
  :focus-visible{outline:2px solid var(--flare);outline-offset:2px;border-radius:4px}
  @keyframes confirmRing{from{box-shadow:0 0 0 0 rgba(241,187,100,.55)}to{box-shadow:0 0 0 16px rgba(241,187,100,0)}}
  .justdone{animation:confirmRing .55s ease-out}
  .field.slim{padding:13px 16px;box-shadow:none;background:var(--wash)}
  .ng-t{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--flare-deep);font-weight:700;margin:26px 0 10px}
  button.step{width:100%;text-align:left;background:none;border:none;font:inherit;cursor:pointer}
  .donewrap{text-align:center;padding:48px 0}
  .donewrap .bigmark{width:64px;height:64px;border-radius:50%;background:var(--ink);box-shadow:0 0 0 3px var(--flare),0 0 40px 4px rgba(241,187,100,.5);margin:0 auto 26px}
  .rm-b{display:flex;overflow:hidden}
  .rm-b i{display:block}
</style>
</head>
<body>
<div id="gate">
  <div class="gecl"></div>
  <div class="gwm">SMALL CIRCLE</div>
  <div class="gsub">E-Learning Module · Private Preview</div>
  <div class="grow"><input id="gatecode" type="password" placeholder="Passcode" autocomplete="off" autofocus><button id="gatego">Enter</button></div>
  <div class="gerr" id="gateerr"></div>
  <div class="ghint">Your passcode is in your invite from Small Circle.</div>
</div>
<header>
  <div class="hleft">
    <button class="burger" id="burger" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
    <div class="brandlockup">
      <span class="eclipse"></span>
      <span class="nm">SMALL CIRCLE</span>
      <span class="sep">·</span>
      <span class="doc">E-Learning Module</span>
      <span class="tag" id="brandtag">TOTALITY</span>
    </div>
  </div>
  <div class="topright">
    <div class="saved"><span class="dot"></span> Saved just now</div>
    <div class="pct"><div class="bar"><i id="topbar"></i></div><b id="toppct">0%</b> <span class="pctlbl">reviewed</span></div>
  </div>
  <div id="mprog"><i id="mprogi"></i></div>
</header>

<div id="scrim"></div>
<div class="shell">
  <nav class="rail" id="rail"></nav>
  <main id="main"></main>
</div>

<div class="footnav">
  <button class="btn ghost" id="backbtn">← Back</button>
  <div class="hint" id="foothint"></div>
  <button class="btn pri" id="nextbtn">Continue →</button>
</div>
<div class="toast" id="toast"><span class="tk">✓</span><span id="toastmsg">Confirmed</span></div>

<script>
// ---------- Data model: pre-filled Totality brief ----------
const SRC = {
  call:"From your discovery call",
  proposal:"From the proposal",
  site:"From your website",
  sc:"From Small Circle"
};
function F(label, why, source, type, value, state){ return {label, why, source, type, value, state:state||'review'}; }

const brief = {
  brand:"Totality",
  steps:[
    { id:"welcome", nav:"How this works", sub:"Start here", kind:"welcome" },

    { id:"basics", nav:"The basics", sub:"Title, description, brand assets", kind:"fields",
      hint:"The essentials for your course. Review each field and adjust anything that is not right.",
      fields:[
        F("Course title","This shows on the course home screen and in the SGWS library.",SRC.proposal,"text","Totality: Sell the Moment"),
        F("Course description","One or two sentences. Sets the tone before the first lesson.",SRC.proposal,"textarea","A single-estate tequila from the highlands of Jalisco. Nothing added, ever, and a reserve bottled only in the minutes of a total eclipse. Learn the story, the range, and how to sell the wait."),
        F("Header image","The first image a learner sees. We favor a lifestyle shot over a bottle shot so it stays current. High-res, no words.","We can source this","asset","",'needs'),
        F("Brand logo","Vector or transparent PNG, used throughout the course chrome.","From your brand guide","asset","logo received",'confirmed'),
        F("Brand guide link","Colors, type, and voice so the course matches your brand exactly.",SRC.site,"text","totality.com/brand (BVI on file)"),
      ]},

    { id:"story", nav:"Your story", sub:"Intro, founder, timeline", kind:"story",
      hint:"Your brand history becomes an interactive <b>timeline</b> in the course. Review the events below, and edit, reorder, or add your own.",
      intro:F("Brand introduction","3 to 4 sentences, first person. Opens the Our Story lesson.",SRC.call,"textarea","We are one family, one estate, high in the highlands of Jalisco. Our founder came to tequila through the sky, and built a house around a simple idea: the things worth seeing make you wait. Nothing is added, ever."),
      founder:F("Founder spotlight — Joaquín Vega","Optional. A short bio and a quote power the founder card.",SRC.call,"textarea","Joaquín Vega, a lifelong eclipse chaser, grew up in the agave rows of Los Altos. Quote: “Everything worth seeing makes you wait.”"),
      timeline:[
        {date:"1991", title:"The eclipse that started it", desc:"At nine, Joaquín's grandfather walks him out of the fields to stand in the shadow of a total eclipse. Four minutes of daytime dark.", state:"confirmed"},
        {date:"2009", title:"First plantings on the ridge", desc:"The family plants estate agave on the high red-clay slopes of Los Altos.", state:"confirmed"},
        {date:"2017", title:"First estate harvest", desc:"The first fully estate-grown, hand-harvested crop comes in.", state:"review"},
        {date:"2024", title:"The first eclipse-bottled Reserve", desc:"A single barrel is bottled during the minutes of a real total eclipse, dated and numbered.", state:"review"},
      ]},

    { id:"production", nav:"How it's made", sub:"Process steps, terroir", kind:"stub",
      stubnote:"A five-step production walkthrough (brick-oven roast, tahona, open-air ferment, copper pot still, nothing added) with optional highland terroir notes. Review and refine, same as the other sections." },

    { id:"lineup", nav:"The lineup", sub:"Products, roles, facts", kind:"lineup",
      hint:"Each product becomes its own card in the course. Check the <b>selling role</b> and the details for each, and edit anything.",
      products:[
        { name:"Blanco", role:"DEFINE", state:"confirmed", facts:[["Style","Unaged, 100% blue agave, additive-free"],["Palate","Bright agave, citrus zest, white pepper"],["Serve","The three-ingredient margarita"],["Sell","The house statement, nothing to hide"]] },
        { name:"Reposado", role:"ANCHOR", state:"review", facts:[["Aging","8 months, ex-bourbon oak"],["Palate","Soft gold, vanilla, light spice"],["Serve","The Highland Paloma"],["Sell","The versatile back-bar workhorse"]] },
        { name:"Añejo", role:"SERIOUS", state:"review", facts:[["Aging","18 months, French + American oak"],["Palate","Dried fig, baking spice, toasted oak"],["Serve","Neat, one rock, orange peel"],["Sell","The credibility sipper"]] },
        { name:"Cristalino", role:"CURIOSITY", state:"review", facts:[["Style","Añejo, charcoal-filtered clear"],["Palate","Añejo depth in a clear pour"],["Serve","Neat, chilled"],["Sell","The aged-but-clear discovery"]] },
        { name:"Totality Reserve", role:"DEPTH", state:"review", facts:[["Style","Extra añejo, single barrel"],["Detail","Bottled only during a total eclipse, dated + numbered"],["Palate","Dark caramel, leather, long finish"],["Sell","The unrepeatable trade-up"]] },
      ]},

    { id:"selling", nav:"Why it sells", sub:"Features, benefits, awards", kind:"selling",
      hint:"How the brand sells, shown as three <b>feature-and-benefit</b> cards learners tap to reveal. Review and refine the pairings.",
      fb:[
        {f:"Additive-free", b:"The purity bartenders and guests now ask for by name.", state:"confirmed"},
        {f:"Single highland estate", b:"Full traceability and a sweeter, brighter agave you can taste.", state:"review"},
        {f:"The eclipse Reserve", b:"An unrepeatable, dated bottling that trades the check up.", state:"review"},
      ],
      marks:["Additive-Free","100% Blue Agave","Estate Grown"],
      awards:F("Awards & accolades","Optional. Title, score, and an image if you have one. SGWS lists these on the selling screen.","We'll add any you send","text","(none on file yet — add if available)","needs") },

    { id:"assets", nav:"Assets & links", sub:"Logo, imagery, sell sheets", kind:"assets",
      hint:"Links beat attachments: when you update a file at the same link, your course stays current without a rebuild." },

    { id:"exam", nav:"Knowledge check", sub:"Approve our draft quiz", kind:"exam" },
  ]
};

// ---------- State ----------
let cur = 0;
let lastView = "";
const stepEl = {};

// completeness: count confirmable items across all steps
function tally(){
  let total=0, done=0, needsYou=0;
  const one=(f)=>{ total++; if(f.state==='confirmed'||f._skipped)done++; else if(f.state==='needs'||!(f.value||f.desc||f.name||f.f||'').trim())needsYou++; };
  brief.steps.forEach(s=>{
    if(s.kind==='fields'){ s.fields.forEach(one); }
    if(s.kind==='story'){ [s.intro,s.founder].forEach(one); s.timeline.forEach(t=>{total++; if(t.state==='confirmed')done++;}); }
    if(s.kind==='lineup'){ if(s.intro)one(s.intro); s.products.forEach(p=>{total++; if(p.state==='confirmed')done++;}); }
    if(s.kind==='selling'){ s.fb.forEach(x=>{total++; if(x.state==='confirmed')done++;}); one(s.awards); if(s.channel)one(s.channel); }
  });
  return {total,done,needsYou,pct: total? Math.round(done/total*100):0};
}
// per-step status for rail
function stepStatus(s){
  let items=[], done=0;
  if(s.kind==='fields') items=s.fields.map(f=>f.state);
  else if(s.kind==='story'){ items=[s.intro.state,s.founder.state,...s.timeline.map(t=>t.state)]; }
  else if(s.kind==='lineup') items=[...(s.intro?[s.intro.state]:[]),...s.products.map(p=>p.state)];
  else if(s.kind==='selling'){ items=[...s.fb.map(x=>x.state),s.awards.state,...(s.channel?[s.channel.state]:[])]; }
  else return s.kind==='exam'?'internal':'none';
  done=items.filter(x=>x==='confirmed').length;
  if(done===0) return 'none';
  if(done===items.length) return 'done';
  return 'partial';
}

const svgSource='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h10l6 6v10H4z"/><path d="M14 4v6h6"/></svg>';

// ---------- Render ----------
function pill(state){
  const map={review:['sp-review','Needs your review'],confirmed:['sp-confirmed','Confirmed'],needs:['sp-needs','Over to you']};
  const [cls,txt]=map[state]; return `<span class="statepill ${cls}"><span class="d"></span>${txt}</span>`;
}
function fieldCard(f, idx, ctx){
  const empty = !(f.value||'').trim() && f.type!=='asset';
  const ph = empty ? `Our research didn't turn this up, so we left it blank rather than guess. You're the source here.` : '';
  const control = f.type==='textarea'
      ? `<textarea rows="3" data-edit="${ctx}:${idx}" placeholder="${ph}">${f.value}</textarea>`
      : f.type==='asset'
      ? assetControl(f, ctx, idx)
      : `<input type="text" data-edit="${ctx}:${idx}" placeholder="${ph}" value="${f.value.replace(/"/g,'&quot;')}">`;
  const actions = f.state==='confirmed'
      ? `<button class="btn sm" data-unconfirm="${ctx}:${idx}">Edit</button>`
      : empty
      ? (f._skipped
          ? `<button class="btn sm ghost" data-unskip="${ctx}:${idx}">We'll follow up. Undo?</button>`
          : `<button class="btn ok sm" data-focus="${ctx}:${idx}">＋ Add this</button><button class="btn sm ghost" data-skip="${ctx}:${idx}">Skip, we'll follow up</button>`)
      : `<button class="btn ok sm" data-confirm="${ctx}:${idx}">✓ Looks right</button><button class="btn sm ghost" data-focus="${ctx}:${idx}">Make changes</button>`;
  const hasAdd = f._sugg && f._sugg.some(c=>c.kind==='add');
  const chips = (f._sugg && f._sugg.length && f.state!=='confirmed')
    ? `<span class="chipslbl">${empty?'Start from one of these:':(hasAdd?'From our research, tap to add:':'Tap to add:')}</span><div class="chips">${f._sugg.map((c,ci)=>`<button class="chip ${c.kind}" data-chip="${ctx}:${idx}:${ci}" title="${c.kind==='add'?'From our research, verified':'Idea starter'}">${c.label.replace(/^\+\s*/,'')}</button>`).join('')}</div>`
    : '';
  const stateCls = f.state==='confirmed'?'confirmed':(empty||f.state==='needs'?'needs':'');
  return `<div class="field ${stateCls} ${f._flash?'justdone':''}">
    <div class="fhead"><div class="flabel">${f.label}<button type="button" class="why" aria-label="Why we ask this">i<span class="whytip">${f.why}</span></button></div>${f._skipped?'<span class="statepill sp-review"><span class="d"></span>We\'ll follow up</span>':pill(empty?'needs':f.state)}</div>
    <div class="source">${svgSource} ${f.source}</div>
    ${control}
    ${chips}
    <div class="frow">${actions}</div>
  </div>`;
}
function assetControl(f, ctx, idx){
  const got = f.value && f.state==='confirmed';
  return `<div class="asset">
      <div class="assetthumb">${got?'✓ received':'drop / preview'}</div>
      <div>
        <div class="assetopts">
          <button class="segbtn ${f._m==='up'?'on':''}" data-am="${ctx}:${idx}:up">Upload a file</button>
          <button class="segbtn ${f._m==='link'?'on':''}" data-am="${ctx}:${idx}:link">Paste a link</button>
          <button class="segbtn ${f._m==='src'||!f._m?'on':''}" data-am="${ctx}:${idx}:src">Let us source it</button>
        </div>
        <div class="assetnote">${(f._m==='src'||!f._m)?'Prefer not to hunt it down? We can source this for you.':(f._m==='link'?'Paste a shareable link (no expiring links, please).':'Drag a file here or click to upload.')}</div>
      </div>
    </div>`;
}

function render(){
  // rail
  // No rail title: the top bar already carries brand + module (the long
  // string wrapped badly in the sidebar, owner feedback 2026-07-15).
  const t=tally();
  let rh='';
  brief.steps.forEach((s,i)=>{
    const st=stepStatus(s);
    const cls=st==='done'?'done':st==='partial'?'partial':st==='internal'?'internal':'';
    const badge=st==='done'?'✓':st==='internal'?'SC':(i);
    rh+=`<div class="step ${i===cur?'active':''} ${cls}" data-go="${i}">
      <div class="sd">${badge}</div>
      <div><div class="st">${s.nav}</div><div class="ss">${s.sub}</div></div></div>`;
  });
  const togo=t.total-t.done;
  rh+=`<div class="railmeter"><div class="rm-t"><span>Your review</span><b>${t.done}/${t.total}</b></div><div class="rm-b"><i style="width:${t.pct}%"></i></div><div class="rm-n">${togo===0?'All set, ready to submit':`${togo} quick look${togo===1?'':'s'} to go${t.needsYou?` · ${t.needsYou} need you`:''}`}</div></div>`;
  document.getElementById('rail').innerHTML=rh;
  const bt=document.getElementById('brandtag'); if(bt) bt.textContent=brief.brand.toUpperCase();
  document.getElementById('topbar').style.width=t.pct+'%';
  document.getElementById('mprogi').style.width=t.pct+'%';
  const tp=document.getElementById('toppct'); if(tp){tp.textContent=`${t.done} of ${t.total}`;}

  // main
  const s=brief.steps[cur];
  let m='';
  if(brief._submitted){ m=submittedHTML(); }
  else if(brief._confirmSubmit && cur===brief.steps.length-1){ m=submitSummaryHTML(); }
  else if(s.kind==='welcome') m=welcomeHTML();
  else{
    m=`<div class="eyebrow">Step ${cur} of ${brief.steps.length-1}</div><h1>${s.nav}</h1>`;

// ---------- Uploads: sign → direct PUT to storage → confirm ----------
const UP_MAX_BYTES=2*1024*1024*1024, UP_MAX_COUNT=30;
let upActive=0; const upQueue=[];
function renderUploads(){ const el=document.getElementById('uplist'); if(el) el.innerHTML=uploadsListHTML(); }
function paintProgress(u){
  const i=(brief._uploads||[]).indexOf(u); if(i<0) return;
  const bar=document.querySelector(`[data-upbar="${i}"]`);
  if(bar){ bar.style.width=(u.pct||0)+'%';
    const row=document.querySelector(`[data-uprow="${i}"] .upstate`);
    if(row) row.textContent=(u.pct||0)+'%';
  } else renderUploads();
}
function addFiles(files){
  if(!window.__dispatchMode){ toast('Uploads switch on with your live brief link'); return; }
  if(!files.length) return;
  brief._uploads=brief._uploads||[];
  const before=brief._uploads.length;
  for(const f of files){
    if(f.size<=0){ toast(`${f.name} looks empty, check it and try again`); continue; }
    if(f.size>UP_MAX_BYTES){ toast(`${f.name} is over 2 GB, send us a link instead`); continue; }
    if(brief._uploads.length+(brief._received||[]).length>=UP_MAX_COUNT){ toast('That is plenty! Reply to your invite email for the rest.'); break; }
    const u={name:f.name,size:f.size,state:'queued',pct:0,file:f};
    brief._uploads.push(u); upQueue.push(u);
  }
  if(brief._uploads.length>before){ renderUploads(); pumpUploads(); }
}
function pumpUploads(){
  while(upActive<2 && upQueue.length){ const u=upQueue.shift(); upActive++; uploadOne(u).finally(()=>{ upActive--; pumpUploads(); }); }
}
async function upConfirm(u){
  const c=await fetch(`${DISPATCH_API}/api/elearning/briefs/${encodeURIComponent(DBRIEF)}/assets/${encodeURIComponent(u.assetId)}/complete`,{
    method:'POST', headers:{Authorization:`Bearer ${DTOKEN}`}});
  const body=await c.json().catch(()=>({}));
  if(!c.ok||!body.ok){
    // 413 (server deleted an oversize object) and 404 (asset gone) mean
    // this asset id is dead: the next retry must start over.
    if(c.status===413||c.status===404){ u.assetId=null; u.putDone=false; }
    throw Object.assign(new Error('confirm failed'),{friendly:body.friendly});
  }
}
async function uploadOne(u){
  try{
    // Confirm-only retry: the bytes already landed, never re-upload them.
    if(u.putDone&&u.assetId){
      u.state='uploading'; renderUploads();
      await upConfirm(u);
      u.state='done'; u.pct=100; renderUploads(); toast('Received: '+u.name);
      return;
    }
    u.state='signing'; renderUploads();
    // Retry reuses the SAME asset id so a flaky connection never burns
    // extra upload slots server-side.
    const signBody=u.assetId?{asset_id:u.assetId}:{name:u.file.name,content_type:u.file.type||'application/octet-stream',size_bytes:u.file.size};
    const r=await fetch(`${DISPATCH_API}/api/elearning/briefs/${encodeURIComponent(DBRIEF)}/assets`,{
      method:'POST',
      headers:{Authorization:`Bearer ${DTOKEN}`,'content-type':'application/json'},
      body:JSON.stringify(signBody)});
    const body=await r.json().catch(()=>({}));
    if(body&&body.enabled===false){ u.state='failed'; u.err='Uploads are not switched on yet. Paste links below instead.'; renderUploads(); return; }
    if(!r.ok||!body.upload_url||!body.asset_id){
      if(r.status===404&&u.assetId){ u.assetId=null; }
      u.state='failed'; u.err=body.friendly||"Couldn't start this upload."; renderUploads(); return;
    }
    u.assetId=body.asset_id; u.state='uploading'; renderUploads();
    await new Promise((resolve,reject)=>{
      const x=new XMLHttpRequest();
      x.open('PUT',body.upload_url);
      x.setRequestHeader('Content-Type',body.content_type||u.file.type||'application/octet-stream');
      x.upload.onprogress=e=>{ if(e.lengthComputable){ u.pct=Math.round(e.loaded/e.total*100); paintProgress(u); } };
      x.onload=()=>{ if(x.status>=200&&x.status<300){resolve();}else{reject(new Error('upload failed ('+x.status+')'));} };
      x.onerror=()=>reject(new Error('network hiccup'));
      x.send(u.file);
    });
    u.putDone=true;
    await upConfirm(u);
    u.state='done'; u.pct=100; renderUploads(); toast('Received: '+u.name);
  }catch(err){
    u.state='failed';
    u.err=(err&&err.friendly)||"Didn't go through. Check your connection and try again.";
    renderUploads();
  }
}

      <textarea rows="3" data-examcomment placeholder="e.g. Question 2 should mention the cold brew, and please add one about the serving ritual.">${brief._examComment||''}</textarea></div>
    </div>`;
  }
  return intro + `<div class="internalbox"><div class="lbl">Draft preview</div>
      <div class="exq"><div class="q">1 &nbsp;A guest wants an additive-free tequila for a clean margarita. Which do you pour?</div>
        <div class="opts"><div class="opt correct">Blanco — the additive-free house statement</div><div class="opt">Totality Reserve — the eclipse single barrel</div><div class="opt">Añejo — the aged sipper</div><div class="opt">Cristalino — the aged-clear curiosity</div></div></div>
      <div class="exq"><div class="q">2 &nbsp;What makes the Totality Reserve unrepeatable?</div>
        <div class="opts"><div class="opt correct">It's bottled only during a real total eclipse, dated and numbered</div><div class="opt">It's the cheapest expression</div><div class="opt">It's aged the shortest</div><div class="opt">It uses added color</div></div></div>
      <p style="margin-top:14px;color:var(--sub);font-size:13px">Plus four more, drawn from your story, production, and lineup.</p>
      <div class="frow"><button class="btn pri" onclick="toast('Noted, thank you')">Looks good</button><button class="btn">Suggest a change</button></div>
    </div>`;
}

function toast(msg){ const t=document.getElementById('toast'); document.getElementById('toastmsg').textContent=msg; t.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),1700); }
function getField(ref){ const [ctx,idx]=ref.split(':'); const s=brief.steps[cur];
  // refs are "<section>:<slot>" where slot is a NAMED slot (intro/founder/
  // awards/channel) or a numeric index into a fields-kind step.
  if(idx==='intro') return s.intro||null;
  if(idx==='founder') return s.founder||null;
  if(idx==='awards') return s.awards||null;
  if(idx==='channel') return s.channel||null;
  return (s.fields&&s.fields[idx])||null; }

document.addEventListener('click',e=>{
  const go=e.target.closest('[data-go]'); if(go){ cur=+go.dataset.go; closeMenu(); render(); return; }
  const c=e.target.closest('[data-confirm]'); if(c){ const f=getField(c.dataset.confirm); if(f){f.state='confirmed'; f._flash=true; toast('Confirmed'); render();} return; }
  const sk=e.target.closest('[data-skip]'); if(sk){ const f=getField(sk.dataset.skip); if(f){f._skipped=true; toast("Noted, we'll follow up on this one"); render();} return; }
  if(e.target.closest('[data-confirmstep]')){
    const st=brief.steps[cur]; let n=0;
    const ok=(f)=>{ if((f.value||f.desc||f.name||f.f||'').trim()&&f.state==='review'){f.state='confirmed';f._flash=true;n++;} };
    if(st.kind==='fields') st.fields.forEach(ok);
    if(st.kind==='story'){ ok(st.intro); ok(st.founder); st.timeline.forEach(t=>{if(t.state==='review'){t.state='confirmed';t._flash=true;n++;}}); }
    if(st.kind==='lineup'){ if(st.intro)ok(st.intro); st.products.forEach(pr=>{if(pr.state==='review'){pr.state='confirmed';pr._flash=true;n++;}}); }
    if(st.kind==='selling'){ st.fb.forEach(x=>{if(x.state==='review'){x.state='confirmed';x._flash=true;n++;}}); ok(st.awards); if(st.channel)ok(st.channel); }
    toast(`Section confirmed, ${n} item${n===1?'':'s'}`); render(); return;
  }
  if(e.target.closest('[data-submitanyway]')){ brief._confirmSubmit=false; if(window.__dispatchMode){dispatchSubmit();}else{brief._submitted=true;render();} return; }
  if(e.target.closest('[data-resume]')){ brief._confirmSubmit=false; const idx=brief.steps.findIndex((st,i)=>i>0&&stepStatus(st)!=='done'&&stepStatus(st)!=='internal'); cur=idx>0?idx:1; render(); return; }
  const us=e.target.closest('[data-unskip]'); if(us){ const f=getField(us.dataset.unskip); if(f){delete f._skipped; render();} return; }
  const u=e.target.closest('[data-unconfirm]'); if(u){ const f=getField(u.dataset.unconfirm); if(f){f.state='review'; render();} return; }
  const fo=e.target.closest('[data-focus]'); if(fo){ const el=document.querySelector(`[data-edit="${fo.dataset.focus}"]`); if(el){el.focus();} return; }
  const am=e.target.closest('[data-am]'); if(am){ const [ctx,idx,mode]=am.dataset.am.split(':'); const f=getField(ctx+':'+idx); if(f){f._m=mode; if(mode==='up'||mode==='link'){f.state='needs';} render();} return; }
  const tok=e.target.closest('[data-tlok]'); if(tok){ brief.steps[cur].timeline[tok.dataset.tlok].state='confirmed'; toast('Event confirmed'); render(); return; }
  const tun=e.target.closest('[data-tlunc]'); if(tun){ brief.steps[cur].timeline[tun.dataset.tlunc].state='review'; render(); return; }
  if(e.target.closest('[data-addtl]')){ brief.steps[cur].timeline.push({date:"Year",title:"New event",desc:"Describe what happened...",state:"review"}); toast('Event added'); render(); return; }
  const pok=e.target.closest('[data-pok]'); if(pok){ brief.steps[cur].products[pok.dataset.pok].state='confirmed'; toast('Product confirmed'); render(); return; }
  const pun=e.target.closest('[data-punc]'); if(pun){ brief.steps[cur].products[pun.dataset.punc].state='review'; render(); return; }
  const ch=e.target.closest('[data-chip]'); if(ch){
    const [ctx2,idx2,ci]=ch.dataset.chip.split(':');
    const f=getField(ctx2+':'+idx2);
    if(f&&f._sugg&&f._sugg[ci]){
      const t=f._sugg[ci].text;
      f.value=(f.value?f.value.replace(/\s+$/,'')+" ":"")+t;
      if(f.state==='confirmed')f.state='review';
      f._sugg.splice(ci,1);
      toast(f._sugg?'Added, make it yours':'Added');
      render(); return;

  const fbok=e.target.closest('[data-fbok]'); if(fbok){ brief.steps[cur].fb[fbok.dataset.fbok].state='confirmed'; toast('Confirmed'); render(); return; }

  if(e.target.closest('[data-addprod]')){ brief.steps[cur].products.push({name:"", role:"DEFINE", state:"review", facts:[], _new:true}); render(); return; }
  if(e.target.closest('[data-addfb]')){ brief.steps[cur].fb.push({f:"", b:"", state:"review", _new:true}); render(); return; }
});

// ---------- Dispatch bridge (WS29): load + submit REAL briefs ----------
// A share link carries ?brief=<id>&token=<one-time key>. With both present
// we fetch the verified, grounded document from Dispatch, rebuild the
// applet model from it, and post the supplier's confirmations/edits back.
// Without them the built-in Totality demo renders untouched.
const DISPATCH_API = "https://dispatch.smallcircle.ai";
const _q = new URLSearchParams(location.search);
const DBRIEF = _q.get("brief"), DTOKEN = _q.get("token");
window.__dispatchMode = !!(DBRIEF && DTOKEN);
let dispatchDoc = null, dispatchSubmitted = false;

const _stFrom = {prefilled:"review", confirmed:"confirmed", edited:"confirmed", needs_client:"needs"};
const _stTo   = {review:"prefilled", confirmed:"confirmed", needs:"needs_client"};
function _f(df, fallbackLabel){
  const label = df.label || fallbackLabel || "";
  const type = (df.value && df.value.length > 90) ? "textarea" : "text";
  const o = F(label, df.why || "", (df.source && df.source.label) || "From Small Circle", type, df.value || "", _stFrom[df.state] || "review");
  o._id = df.id;
  if (df.suggestions && df.suggestions.length) o._sugg = df.suggestions.map(x=>({kind:x.kind,label:x.label,text:x.text}));
  return o;
}
function _sec(doc, id){ return doc.sections.find(s=>s.id===id) || null; }

function hydrateFromDispatch(doc){
  dispatchDoc = doc;
  brief.brand = doc.client.display;
  const basics = _sec(doc,"basics"), story = _sec(doc,"story"), lineup = _sec(doc,"lineup"),
        selling = _sec(doc,"selling"), exam = _sec(doc,"exam");
  const steps = [ { id:"welcome", nav:"How this works", sub:"Start here", kind:"welcome" } ];
  if(basics) steps.push({ id:"basics", nav:"The basics", sub:"Title, description, positioning", kind:"fields",
    hint:"The essentials for your module. Review each field and adjust anything that is not right.",
    fields: basics.fields.map(f=>_f(f)) });
  if(story) steps.push({ id:"story", nav:"Your story", sub:"Intro, founder, timeline", kind:"story",
    hint:"Your brand history becomes an interactive <b>timeline</b>. Review the events below, and edit, reorder, or add your own. A line or two in the founder's own words is gold if you have it.",
    intro:_f(story.intro,"Brand introduction"), founder:_f(story.founder,"Founder spotlight"),
    timeline: story.timeline.map(t=>({date:t.date, title:t.title, desc:t.desc, state:_stFrom[t.state]||"review", _id:t.id})) });
  const prod = _sec(doc,"production");
  const prodFields = [];
  if(prod){
    if(prod.intro && (prod.intro.value || (prod.intro.suggestions||[]).length)){ const pf=_f(prod.intro,"Production intro"); pf._id="production.intro"; pf.type="textarea"; prodFields.push(pf); }
    (prod.steps||[]).forEach((st,i)=>{
      const sf=F(`Step ${i+1}, ${st.title}`, st.why||"", (st.source&&st.source.label)||"From our research", "textarea", st.desc||"", _stFrom[st.state]||"review");
      sf._id=`production.steps.${st.id}`; sf._title=st.title; prodFields.push(sf);
    });
  }
  if(prodFields.length) steps.push({ id:"production", nav:"How it's made", sub:"Production, step by step", kind:"fields",
    hint:"The production story as steps a learner can retell. Confirm or fix each one.", fields: prodFields });
  else steps.push({ id:"production", nav:"How it's made", sub:"Production, step by step", kind:"stub",
    stubnote:"Our research didn't surface enough verified production detail, so we left this open rather than guessing. We'll draft it together after this brief comes back, or add anything you have in the note on the final step." });
  if(lineup) steps.push({ id:"lineup", nav:"The lineup", sub:"Products, roles, facts", kind:"lineup",
    hint:"Each product becomes its own card. Check the <b>selling role</b> for each (the menu explains every role), and aim for 3 to 5 strong facts per product: production or aging, appearance, flavor, how to serve it.",
    ...(lineup.intro?{intro:_f(lineup.intro,"Lineup introduction")}:{}),
    products: lineup.products.map(p=>({name:p.name, role:p.role, state:_stFrom[p.state]||"review", facts:(p.facts||[]).map(f=>Array.isArray(f)?f:[f.k,f.v]), _id:p.id})) });
  if(selling) steps.push({ id:"selling", nav:"Why it sells", sub:"Features, benefits, awards", kind:"selling",
    hint:"How the brand sells, shown as <b>feature-and-benefit</b> cards. Review and refine the pairings.",
    fb: selling.fb.map(x=>({f:x.f, b:x.b, state:_stFrom[x.state]||"review"})),
    marks: selling.marks, awards:_f(selling.awards,"Awards & accolades"),
    ...(selling.channel?{channel:_f(selling.channel,"On-premise & off-premise playbook")}:{}) });
  // Any remaining fields-kind sections (e.g. the Spotlight "additional
  // section") render as generic field steps instead of being dropped.
  doc.sections.filter(x=>x.kind==="fields" && x.id!=="basics").forEach(x=>{
    if(!x.fields || !x.fields.length) return;
    steps.push({ id:x.id, nav:x.title||x.id, sub:x.hint?"":"Optional, but memorable", kind:"fields",
      ...(x.hint?{hint:x.hint}:{}), fields:x.fields.map(f=>_f(f)) });
  });
  steps.push({ id:"assets", nav:"Assets & links", sub:"Logo, imagery, sell sheets", kind:"assets",
    hint:"Links beat attachments: when you update a file at the same link, your course stays current without a rebuild." });
  steps.push({ id:"exam", nav:"Knowledge check", sub:"Approve our draft quiz", kind:"exam" });
  brief._exam = exam ? exam.items.map(i=>({stem:i.stem, options:i.options})) : [];
  // Restore exam approval + the three free-text notes from what the
  // server actually has, so a fresh load (any device, or this same
  // browser after a reload) shows real saved content instead of
  // reverting to an un-approved, empty-textarea state (adversarial
  // review 2026-07-15: these local-only fields never survived a draft
  // round-trip once localStorage-restore was dropped in dispatch mode).
  brief._examOk = !!(exam && exam.items.length && exam.items.every(i=>i.state==='confirmed'));
  const split = splitClientComment(exam && exam.client_comment || '');
  brief._examComment = split.examComment;
  brief._stubNote = split.stubNote;
  brief._assetNote = split.assetNote;
  brief.steps = steps;
}

// applyBackToDispatch folds _examComment/_stubNote/_assetNote into ONE
// exam.client_comment string, tagged with the SAME prefixes it writes
// ("Production notes: ", "Asset links: "); this reverses that fold on
// load so the three boxes show their own saved text, not a jumble.
function splitClientComment(raw){
  const out={examComment:'',stubNote:'',assetNote:''};
  if(!raw) return out;
  let bucket='examComment';
  for(const line of raw.split('\n')){
    if(line.startsWith('Production notes: ')){ bucket='stubNote'; out.stubNote+=(out.stubNote?'\n':'')+line.slice('Production notes: '.length); continue; }
    if(line.startsWith('Asset links: ')){ bucket='assetNote'; out.assetNote+=(out.assetNote?'\n':'')+line.slice('Asset links: '.length); continue; }
    out[bucket]+=(out[bucket]?'\n':'')+line;
  }
  return out;
}

function applyBackToDispatch(){
  const doc = dispatchDoc;
  const basics = _sec(doc,"basics"), story = _sec(doc,"story"), lineup = _sec(doc,"lineup"),
        selling = _sec(doc,"selling"), exam = _sec(doc,"exam");
  const put = (docField, af) => { if(!docField||!af) return; docField.value = af.value; docField.state = _stTo[af.state] || "prefilled"; };
  const prodSec = _sec(doc,"production");
  brief.steps.forEach(s=>{
    // Generic fields steps (basics, spotlight, any future fields section)
    // post back by section id + field id. Production is handled below.
    if(s.kind==="fields" && s.id!=="production"){
      const sec=_sec(doc, s.id);
      if(sec && sec.kind==="fields") s.fields.forEach(af=>put(sec.fields.find(x=>x.id===af._id), af));
    }
    if(s.id==="production" && s.kind==="fields" && prodSec) s.fields.forEach(af=>{
      if(af._id==="production.intro"){ put(prodSec.intro, af); return; }
      const stId=(af._id||"").replace("production.steps.","");
      const d=(prodSec.steps||[]).find(x=>x.id===stId);
      if(d){ d.desc=af.value; d.state=_stTo[af.state]||"prefilled"; }
    });
    if(s.id==="story" && story){
      put(story.intro, s.intro); put(story.founder, s.founder);
      const kept = [];
      s.timeline.forEach((t,i)=>{
        if(t._id){ const d = story.timeline.find(x=>x.id===t._id);
          if(d){ d.date=t.date; d.title=t.title; d.desc=t.desc; d.state=_stTo[t.state]||"prefilled"; kept.push(d); } }
        else kept.push({ id:"tl_c"+(i+1), date:t.date, title:t.title, desc:t.desc,
          why:"Client-added timeline event", required:false,
          source:{label:"Provided by you", citations:[]}, state:"edited" });
      });
      story.timeline = kept;
    }
    if(s.id==="lineup" && lineup){
      if(lineup.intro && s.intro) put(lineup.intro, s.intro);
      s.products.forEach((ap,pi)=>{
      if(ap._id){ const d=lineup.products.find(x=>x.id===ap._id);
        if(d){ d.role=ap.role; d.state=_stTo[ap.state]||"prefilled"; } }
      else if((ap.name||"").trim()){ lineup.products.push({ id:"p_c"+(pi+1), name:ap.name.trim(), role:ap.role||"DEFINE",
        facts:(ap.facts||[]).map(f=>Array.isArray(f)?{k:f[0],v:f[1]}:f),
        why:"Client-added product", required:false, source:{label:"Provided by you",citations:[]}, state:"edited" }); }
      });
    }
    if(s.id==="selling" && selling){
      if(selling.channel && s.channel) put(selling.channel, s.channel);
      s.fb.forEach((ax,i)=>{
        if(selling.fb[i]){ selling.fb[i].state=_stTo[ax.state]||"prefilled"; }
        else if((ax.f||"").trim()||(ax.b||"").trim()){ selling.fb.push({ f:(ax.f||"").trim(), b:(ax.b||"").trim(),
          why:"Client-added pairing", required:false, source:{label:"Provided by you",citations:[]}, state:"edited" }); }
      });
      put(selling.awards, s.awards);
    }
  });
  if(exam && brief._examOk) exam.items.forEach(i=>{ i.state = "confirmed"; });
  const noteBits=[];
  if((brief._examComment||"").trim()) noteBits.push(brief._examComment.trim());
  if((brief._stubNote||"").trim()) noteBits.push("Production notes: "+brief._stubNote.trim());
  if((brief._assetNote||"").trim()) noteBits.push("Asset links: "+brief._assetNote.trim());
  if(exam && noteBits.length) exam.client_comment = noteBits.join("\n");
}

function dispatchFail(msg){
  document.body.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0b0b0c;color:#eee;font-family:system-ui,sans-serif;padding:24px;text-align:center"><div><div style="font-size:22px;font-weight:700;margin-bottom:10px">This link isn't active</div><div style="color:#aaa;max-width:420px;line-height:1.6">${msg}</div></div></div>`;
}

async function dispatchLoad(){
  if(!window.__dispatchMode) return;
  try{
    const r = await fetch(`${DISPATCH_API}/api/elearning/briefs/${encodeURIComponent(DBRIEF)}`,
      { headers: { Authorization: `Bearer ${DTOKEN}` } });
    if(r.status===401){ dispatchFail("This link has expired. Reply to the email that brought you here and we'll send a fresh one right away."); return; }
    if(r.status===404){ dispatchFail("We couldn't find this brief. Reply to your invite email and we'll send a fresh link."); return; }
    const body = await r.json();
    if(body.enabled===false){ dispatchFail("Your brief isn't quite ready yet. We'll email you a fresh link as soon as it is."); return; }
    hydrateFromDispatch(body.brief);
    brief._received = Array.isArray(body.uploaded_assets) ? body.uploaded_assets : [];
    // A draft in the response means real saved progress exists SOMEWHERE
    // (any device, any prior session) — the true, server-verified signal
    // for "welcome, we kept your progress" (owner feedback 2026-07-15).
    brief._hasDraft = !!body.draft_saved_at;
  }catch(err){
    dispatchFail("We couldn't load your brief right now. Please try again in a minute.");
  }
}

async function dispatchSubmit(){
  if(dispatchSubmitted){ toast("Already submitted. Thank you."); return; }
  const btn = document.getElementById('nextbtn');
  btn.disabled = true; btn.textContent = "Submitting…";
  try{
    applyBackToDispatch();
    dispatchDoc.revision = dispatchDoc.revision + 1;
    dispatchDoc.status = "submitted";
    const r = await fetch(`${DISPATCH_API}/api/elearning/briefs/${encodeURIComponent(DBRIEF)}/submission`,
      { method:"POST", headers:{ Authorization:`Bearer ${DTOKEN}`, "content-type":"application/json" },
        body: JSON.stringify(dispatchDoc) });
    const body = await r.json().catch(()=>({}));
    if(r.ok){
      dispatchSubmitted = true;
      brief._submitted = true;
      clearTimeout(draftTimer);
      try{ localStorage.removeItem(saveKey()); }catch(_e){}
      document.getElementById('foothint').textContent = "Submitted. Small Circle has been notified.";
      render();
      return;
    }
    btn.disabled = false; btn.textContent = "Submit your brief";
    if(body.error==="invalid_transition") toast("This brief isn't open for submission just yet. We'll email you the moment it is.");
    else if(body.error==="revision_rejected"||body.error==="revision_conflict") toast("This brief changed since you opened it. Refresh the page to pick up the latest, then submit again.");
    else toast("Couldn't submit right now. Please try again in a minute.");
  }catch(err){
    btn.disabled = false; btn.textContent = "Submit your brief";
    toast("Couldn't submit right now. Please try again in a minute.");
  }
}

function saveKey(){ return `cb_state_${DBRIEF||'demo'}_${dispatchDoc?dispatchDoc.revision:'0'}`; }
function snapshotState(){
  const snap={steps:{},examOk:!!brief._examOk,examComment:brief._examComment||'',stubNote:brief._stubNote||'',assetNote:brief._assetNote||''};
  brief.steps.forEach((st,i)=>{
    const rec={};
    const cap=(k,f)=>{ rec[k]={v:f.value??null,s:f.state,sk:!!f._skipped}; };
    if(st.kind==='fields'){ rec.fields=st.fields.map(f=>({v:f.value,s:f.state,sk:!!f._skipped})); }
    if(st.kind==='story'){ cap('intro',st.intro); cap('founder',st.founder); rec.tl=st.timeline.map(t=>({d:t.date,t:t.title,x:t.desc,s:t.state})); }
    if(st.kind==='lineup'){ if(st.intro)cap('intro',st.intro); rec.prods=st.products.map(p=>({n:p.name,r:p.role,s:p.state,nw:!!p._new})); }
    if(st.kind==='selling'){ rec.fb=st.fb.map(x=>({f:x.f,b:x.b,s:x.state,nw:!!x._new})); cap('awards',st.awards); if(st.channel)cap('channel',st.channel); }
    snap.steps[i]=rec;
  });
  return snap;
}
function persist(){ try{ localStorage.setItem(saveKey(), JSON.stringify(snapshotState())); const sv=document.querySelector('.saved'); if(sv)sv.innerHTML='<span class="dot"></span> Saved · just now'; }catch(_e){} }
function restoreState(){
  let raw=null; try{ raw=localStorage.getItem(saveKey()); }catch(_e){}
  if(!raw) return false;
  try{
    const snap=JSON.parse(raw);
    brief.steps.forEach((st,i)=>{
      const rec=snap.steps[i]; if(!rec)return;
      const app=(f,d)=>{ if(!d)return; if(d.v!=null)f.value=d.v; if(d.s)f.state=d.s; if(d.sk)f._skipped=true; };
      if(st.kind==='fields'&&rec.fields) st.fields.forEach((f,j)=>app(f,rec.fields[j]));
      if(st.kind==='story'){ app(st.intro,rec.intro); app(st.founder,rec.founder);
        (rec.tl||[]).forEach((d,j)=>{ if(st.timeline[j]){ st.timeline[j].date=d.d;st.timeline[j].title=d.t;st.timeline[j].desc=d.x;st.timeline[j].state=d.s; } else { st.timeline.push({date:d.d,title:d.t,desc:d.x,state:d.s}); } }); }
      if(st.kind==='lineup'){ if(st.intro)app(st.intro,rec.intro); (rec.prods||[]).forEach((d,j)=>{ if(st.products[j]){ st.products[j].role=d.r;st.products[j].state=d.s; if(d.nw)st.products[j].name=d.n; } else { st.products.push({name:d.n,role:d.r,state:d.s,facts:[],_new:true}); } }); }
      if(st.kind==='selling'){ (rec.fb||[]).forEach((d,j)=>{ if(st.fb[j]){ st.fb[j].state=d.s; if(d.nw){st.fb[j].f=d.f;st.fb[j].b=d.b;} } else { st.fb.push({f:d.f,b:d.b,state:d.s,_new:true}); } }); app(st.awards,rec.awards); if(st.channel)app(st.channel,rec.channel); }
    });
    brief._examOk=snap.examOk; brief._examComment=snap.examComment; brief._stubNote=snap.stubNote; brief._assetNote=snap.assetNote||'';
    return true;
  }catch(_e){ return false; }
}
// ---------- Continuous autosave (owner request 2026-07-15) ----------
// "Saves automatically" must actually mean saved to Dispatch: the client
// typed something on one browser, opened the same link on another (an
// incognito window, a different device), and none of it was there —
// because it never left the first browser's localStorage. A debounced
// POST to /draft after every edit fixes that: any device pulling this
// link now sees the same in-progress state (server GET pull already
// prefers the draft over the canonical brief, see route.ts).
let draftTimer=null, draftInFlight=false, draftDirty=false;
function setSavedIndicator(state){
  const sv=document.querySelector('.saved'); if(!sv) return;
  if(state==='saving') sv.innerHTML='<span class="dot"></span> Saving…';
  else if(state==='saved') sv.innerHTML='<span class="dot"></span> Saved';
  else if(state==='error') sv.innerHTML='<span class="dot"></span> Not saved, retrying…';
}
function scheduleDraftSave(){
  persist(); // instant same-tab local cache; harmless, never read back in dispatch mode
  if(!window.__dispatchMode) return;
  clearTimeout(draftTimer);
  draftTimer=setTimeout(saveDraftNow, 1200);
}
const DRAFT_SAVE_TIMEOUT_MS=20000;
async function saveDraftNow(){
  if(!dispatchDoc || brief._submitted) return;
  if(draftInFlight){ draftDirty=true; return; }
  draftInFlight=true;
  setSavedIndicator('saving');
  // A silently hung connection (dropped packets, no error) would
  // otherwise wedge draftInFlight forever, since fetch has no built-in
  // timeout (adversarial review 2026-07-15): abort and free it up.
  const controller = ('AbortController' in window) ? new AbortController() : null;
  const killer = controller ? setTimeout(()=>controller.abort(), DRAFT_SAVE_TIMEOUT_MS) : null;
  try{
    applyBackToDispatch();
    const r=await fetch(`${DISPATCH_API}/api/elearning/briefs/${encodeURIComponent(DBRIEF)}/draft`,{
      method:'POST', headers:{Authorization:`Bearer ${DTOKEN}`,'content-type':'application/json'},
      body: JSON.stringify({...dispatchDoc, composed_at: Date.now()}),
      ...(controller?{signal:controller.signal}:{})});
    // A save that resolves AFTER Submit already went through must not
    // paint a misleading "Saved" over the completion screen.
    if(brief._submitted){ /* no-op */ }
    else if(r.ok || r.status===409){
      // 409 "stale" means our view is behind (a submission, or a fresher
      // pull, happened elsewhere) — nothing of ours was lost, so this is
      // NOT an alarming failure to the client; just stop hammering it.
      setSavedIndicator('saved');
      if(r.status===409){ clearTimeout(draftTimer); draftTimer=null; }
    }
    else{ setSavedIndicator('error'); clearTimeout(draftTimer); draftTimer=setTimeout(saveDraftNow, 5000); }
  }catch(_e){
    if(!brief._submitted){
      setSavedIndicator('error');
      clearTimeout(draftTimer); draftTimer=setTimeout(saveDraftNow, 5000);
    }
  }finally{
    if(killer) clearTimeout(killer);
  }
  draftInFlight=false;
  if(draftDirty){ draftDirty=false; clearTimeout(draftTimer); draftTimer=setTimeout(saveDraftNow, 400); }
}

async function boot(){
  await dispatchLoad();
  if(!document.getElementById('main')) return;
  // In dispatch mode the SERVER (draft, or its absence) is the single
  // source of truth for "does saved progress exist" — localStorage is
  // per-browser and gave false positives (same machine previewing twice)
  // and false negatives (a genuinely returning client on another device)
  // alike. Demo mode has no server, so it still uses localStorage.
  const restored = window.__dispatchMode ? !!brief._hasDraft : restoreState();
  brief._restored = restored;
  render();
  if(restored) toast('Welcome, we kept your progress.');
  document.addEventListener('input', ()=>scheduleDraftSave());
  document.addEventListener('click', (e)=>{ if(e.target.closest('button')) setTimeout(scheduleDraftSave,50); });
}

boot();

// ---------- passcode gate (deterrent only; change PASS below) ----------
(function(){
  const PASS = "smallcircle";
  const gate = document.getElementById('gate');
  // A tokened Dispatch link IS the invitation; no passcode friction for clients.
  if(window.__dispatchMode || sessionStorage.getItem('cb_ok')==='1'){ gate.style.display='none'; return; }
  function unlock(){ sessionStorage.setItem('cb_ok','1'); gate.classList.add('hidden'); setTimeout(()=>gate.style.display='none',480); }
  function tryit(){
    const v=document.getElementById('gatecode').value.trim().toLowerCase();
    if(v===PASS) unlock();
    else document.getElementById('gateerr').textContent='Not quite. Try again.';
  }
  document.getElementById('gatego').onclick=tryit;
  document.getElementById('gatecode').addEventListener('keydown',e=>{ if(e.key==='Enter') tryit(); });
})();
</script>
